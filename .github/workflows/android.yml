name: Android CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: 构建 Debug APK
    runs-on: macos-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 检查 Java
        run: java -version

      - name: 安装 Android SDK
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME 2>/dev/null || echo "Checking default locations..."
          ls -la /Users/runner/Library/Android/sdk 2>/dev/null || echo "Not found in default"

      - name: 安装 SDK 组件
        run: |
          if [ -d "$ANDROID_HOME/cmdline-tools" ]; then
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0"
          else
            echo "Android SDK cmdline-tools not found"
            # List available SDK components
            if [ -d "$ANDROID_HOME/platforms" ]; then
              ls $ANDROID_HOME/platforms
            fi
          fi

      - name: 授权 Gradle
        run: |
          chmod +x gradlew
          ls -la gradlew

      - name: 构建 Debug APK
        id: build
        run: |
          echo "Starting build..."
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          echo "---BUILD LOG END---"

      - name: 查看构建日志
        if: failure()
        run: |
          echo "=== Last 100 lines of build.log ==="
          tail -100 build.log 2>/dev/null || echo "No build.log found"

      - name: 查找 APK
        run: |
          echo "=== Looking for APK ==="
          find . -name "*.apk" 2>/dev/null
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK dir not found"

      - name: 上传 APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: readtrack-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
