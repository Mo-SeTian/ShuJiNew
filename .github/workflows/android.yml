name: Android CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: 构建 Debug APK
    runs-on: macos-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 授权 Gradle
        run: |
          chmod +x gradlew
          ls -la gradlew gradle/wrapper/

      - name: 构建 Debug APK
        run: |
          echo "开始构建 Debug APK..."
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log || {
            echo "=== Gradle 构建失败 ==="
            tail -200 build.log
            exit 1
          }
          echo "=== 构建完成 ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK目录不存在"

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: 检查 APK 文件
        run: |
          echo "=== 检查 APK ==="
          echo "当前目录: $(pwd)"
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK 文件存在!"
            ls -lh "$APK_PATH"
          else
            echo "❌ APK 文件不存在"
            echo "=== app/build 目录结构 ==="
            ls -laR app/build/ 2>/dev/null | head -100
            echo "=== build.log 最后 200 行 ==="
            tail -200 build.log 2>/dev/null || echo "build.log 不存在"
            exit 1
          fi

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: readtrack-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
