name: Android CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: 构建 Debug APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: 检查 Java
        run: java -version

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android SDK 组件
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: 授权 Gradle Wrapper
        run: |
          chmod +x gradlew
          ls -la gradlew gradle/wrapper/gradle-wrapper.jar

      - name: 下载依赖
        run: ./gradlew dependencies --no-daemon --console=plain 2>&1 | tail -30

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --no-daemon --console=plain --stacktrace 2>&1

      - name: 检查 APK
        run: |
          echo "=== 检查 APK ==="
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "✅ APK 构建成功！"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ APK 未生成，列出目录内容："
            find app/build -name "*.apk" 2>/dev/null || echo "没有找到 APK"
            find app/build -type d 2>/dev/null | head -20
            exit 1
          fi

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: readtrack-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
